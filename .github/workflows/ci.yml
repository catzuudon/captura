name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read   # least privilege — CI only needs to read the code

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libegl1 tesseract-ocr xvfb
      - run: pip install -r requirements.txt
      - name: Self-test (headless via xvfb)
        run: xvfb-run -a python selftest.py
