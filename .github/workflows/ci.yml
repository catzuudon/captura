name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read   # least privilege — CI only needs to read the code

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libegl1 xvfb
      - run: pip install -r requirements.txt
      - name: Byte-compile (syntax check)
        run: python -m compileall app main.py selftest.py
      # The full selftest drives real screen capture + synthetic input, which a
      # headless runner can't provide. CI instead loads every module under Qt's
      # offscreen platform — this catches import/syntax/init regressions without
      # a display. pynput still needs an X connection at import time, so the
      # smoke test runs under xvfb. The end-to-end selftest runs locally.
      - name: Import smoke test (headless)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          xvfb-run -a python - <<'PY'
          import importlib
          from app import platform as platform_setup
          platform_setup.setup()  # must run before QApplication exists
          from PyQt6.QtWidgets import QApplication
          app = QApplication([])
          modules = [
              "app.theme", "app.hotkey", "app.capture", "app.overlay",
              "app.ocr", "app.tray", "app.settings",
              "app.editor.editor", "app.editor.toolbar", "app.editor.tools",
              "app.editor.canvas", "app.editor.ocr_panel",
          ]
          for name in modules:
              importlib.import_module(name)
              print("imported", name)
          from app.settings import Settings
          assert Settings.load().hotkey, "settings failed to load a default hotkey"
          print("smoke test OK")
          PY
