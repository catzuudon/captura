name: Release

# Builds self-contained installers for macOS, Windows, and Linux on GitHub's
# native runners. Each bundles Tesseract so OCR works with no separate install.
#
#   Tag push  -> builds AND publishes a GitHub Release:
#       git tag v1.0.1 && git push origin v1.0.1
#   Manual run (Actions tab -> Release -> Run workflow) -> builds the installers
#       and uploads them as run artifacts WITHOUT publishing, for testing.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-build.txt
      - name: Vendor Tesseract
        run: |
          set -e
          brew install tesseract dylibbundler
          PREFIX="$(brew --prefix)"
          mkdir -p tesseract/tessdata
          cp "$PREFIX/bin/tesseract" tesseract/
          cp "$PREFIX/share/tessdata/eng.traineddata" tesseract/tessdata/
          [ -f "$PREFIX/share/tessdata/osd.traineddata" ] \
            && cp "$PREFIX/share/tessdata/osd.traineddata" tesseract/tessdata/ || true
          # Copy the binary's dynamic-library chain next to it and rewrite the
          # load paths to @executable_path/libs so it runs off any machine.
          dylibbundler -od -of -b -x tesseract/tesseract -d tesseract/libs/ -p @executable_path/libs/
      - name: Build .app and DMG
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          [ "$VERSION" = "main" ] && VERSION="0.0.0-test"
          pyinstaller --noconfirm --windowed --name Captura \
            --osx-bundle-identifier com.captura.app \
            --icon assets/icon.icns \
            --add-data "assets:assets" \
            --add-data "tesseract:tesseract" \
            main.py
          plutil -replace LSUIElement -bool true dist/Captura.app/Contents/Info.plist
          plutil -replace CFBundleShortVersionString -string "$VERSION" dist/Captura.app/Contents/Info.plist
          plutil -replace CFBundleVersion -string "$VERSION" dist/Captura.app/Contents/Info.plist
          codesign --force --deep -s - dist/Captura.app
          STAGING=$(mktemp -d)
          cp -R dist/Captura.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname Captura -srcfolder "$STAGING" -ov -format UDZO \
            "dist/Captura-$VERSION-macos.dmg"
      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: dist/*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-build.txt
      - name: Vendor Tesseract
        shell: pwsh
        run: |
          choco install tesseract --no-progress -y
          $src = "C:\Program Files\Tesseract-OCR"
          New-Item -ItemType Directory -Force -Path tesseract\tessdata | Out-Null
          Copy-Item "$src\*" tesseract\ -Recurse -Force
          # Keep only English + orientation data to stay lightweight.
          Remove-Item tesseract\tessdata\* -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item "$src\tessdata\eng.traineddata" tesseract\tessdata\
          if (Test-Path "$src\tessdata\osd.traineddata") {
            Copy-Item "$src\tessdata\osd.traineddata" tesseract\tessdata\
          }
      - name: Build .exe
        run: >
          pyinstaller --noconfirm --windowed --name Captura
          --icon assets/icon.ico
          --add-data "assets;assets"
          --add-data "tesseract;tesseract"
          main.py
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        shell: pwsh
        run: |
          $v = $env:GITHUB_REF_NAME -replace '^v',''
          if ($v -eq 'main') { $v = '0.0.0-test' }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$v scripts\captura.iss
      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: dist/*setup.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y libxcb-cursor0 libegl1
      - run: pip install -r requirements-build.txt
      - name: Vendor Tesseract
        run: |
          set -e
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-osd patchelf
          mkdir -p tesseract/tessdata tesseract/libs
          cp "$(command -v tesseract)" tesseract/
          # Bundle non-core shared libs beside the binary; let the system
          # provide glibc/loader. Rewrite rpaths to $ORIGIN so it self-resolves.
          ldd "$(command -v tesseract)" | awk '/=> \// {print $3}' | while read -r lib; do
            case "$lib" in
              */libc.so*|*/libm.so*|*/libpthread.so*|*/libdl.so*|*/librt.so*|*/ld-linux*) ;;
              *) cp -Ln "$lib" tesseract/libs/ 2>/dev/null || true ;;
            esac
          done
          patchelf --set-rpath '$ORIGIN/libs' tesseract/tesseract
          for f in tesseract/libs/*; do patchelf --set-rpath '$ORIGIN' "$f" || true; done
          cp "$(dpkg -L tesseract-ocr-eng | grep '/eng.traineddata$' | head -1)" tesseract/tessdata/
          OSD="$(dpkg -L tesseract-ocr-osd 2>/dev/null | grep '/osd.traineddata$' | head -1)"
          [ -n "$OSD" ] && cp "$OSD" tesseract/tessdata/ || true
      - name: Build tarball
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          [ "$VERSION" = "main" ] && VERSION="0.0.0-test"
          pyinstaller --noconfirm --windowed --name Captura \
            --icon assets/icon.ico \
            --add-data "assets:assets" \
            --add-data "tesseract:tesseract" \
            main.py
          tar -czf "dist/Captura-$VERSION-linux-x86_64.tar.gz" -C dist Captura
      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: dist/*.tar.gz

  release:
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    # Publish a GitHub Release only for tag pushes; manual runs just leave the
    # installers as downloadable run artifacts for testing.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            Captura ${{ github.ref_name }}

            Download for your platform below. OCR works out of the box — Tesseract
            is bundled, no separate install needed. See the README for the one-time
            macOS permission grants (Screen Recording + Input Monitoring).

            **Unsigned builds**: macOS/Windows will warn on first launch — this is
            expected for an open-source app without a paid signing certificate. See
            the README "Verifying downloads" section.
